---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloud-foundry-saltysausage
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: foundry
  syncPolicy:
    automated:
      prune: true
  destination:
    name: cloud
    namespace: foundry
  source:
    repoURL: https://charts.derwitt.dev
    targetRevision: 15.1.2
    chart: foundryvtt
    helm:
      releaseName: saltysausage
      values: |

        config:
          enableTelemetry: true
          defaultWorld: tomb-of-annhiliation
          disableBackups: true
          licenseKeySecret:
            name: saltysausage-foundryvtt
            key: foundry-license-key
          foundryAuthSecret:
            name: saltysausage-foundryvtt
            usernameKey: foundry-username
            passwordKey: foundry-password
          adminKeySecret:
            name: saltysausage-foundryvtt
            key: admin-key
        storage:
          className: longhorn
          size: 5Gi
        podLabels:
          network-policy/allow-world-http-ingress: apply
          network-policy/allow-foundryvtt-egress: apply
          network-policy/allow-github-egress: apply
          network-policy/allow-gitlab-egress: apply
          network-policy/allow-aws-egress: apply
          network-policy/allow-modules-egress: apply
          foundry-instance: saltysausage
        resources:
          requests:
            cpu: 40m
            memory: 512Mi
          limits:
            memory: 512Mi
        ingress:
          enabled: true
          className: traefik
          annotations:
            cert-manager.io/cluster-issuer: saltysausage-com-letsencrypt
            traefik.ingress.kubernetes.io/router.middlewares: "traefik-redirect-to-https@kubernetescrd"
          hosts:
            - host: vtt.saltysausage.com
              paths:
                - path: /
                  pathType: ImplementationSpecific
          tls:
            - hosts:
                - vtt.saltysausage.com
              secretName: foundry-saltysausage-ingress-tls
