---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloud-foundry-code-and-quest
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: foundry
  syncPolicy:
    automated:
      prune: true
  destination:
    name: cloud
    namespace: foundry
  source:
    repoURL: https://charts.derwitt.dev
    targetRevision: 15.1.1
    chart: foundryvtt
    helm:
      releaseName: code-and-quest
      values: |

        config:
          enableTelemetry: true
          defaultWorld: danddhard
          disableBackups: true
          licenseKeySecret:
            name: code-and-quest-foundryvtt
            key: foundry-license-key
          foundryAuthSecret:
            name: code-and-quest-foundryvtt
            usernameKey: foundry-username
            passwordKey: foundry-password
          adminKeySecret:
            name: code-and-quest-foundryvtt
            key: admin-key
        storage:
          className: longhorn
          size: 5Gi
        podLabels:
          network-policy/allow-world-http-ingress: apply
          network-policy/allow-foundryvtt-egress: apply
          network-policy/allow-github-egress: apply
          network-policy/allow-gitlab-egress: apply
          network-policy/allow-aws-egress: apply
          network-policy/allow-modules-egress: apply
        resources:
          requests:
            cpu: 40m
            memory: 512Mi
          limits:
            memory: 512Mi
        ingress:
          enabled: true
          className: traefik
          annotations:
            cert-manager.io/cluster-issuer: code-and-quest-de-letsencrypt
            traefik.ingress.kubernetes.io/router.middlewares: "traefik-redirect-to-https@kubernetescrd"
          hosts:
            - host: vtt.code-and-quest.de
              paths:
                - path: /
                  pathType: ImplementationSpecific
          tls:
            - hosts:
                - vtt.code-and-quest.de
              secretName: foundry-code-and-quest-ingress-tls
